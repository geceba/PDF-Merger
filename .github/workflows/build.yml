name: Build and Release PDF Merger

on:
  push:
    tags:
      - 'v*' # Se activa solo cuando creas un tag (ej. v1.0.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Permiso necesario para crear el Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter PyPDF2 pillow tkinterdnd2 pyinstaller

    - name: Build with PyInstaller
      run: |
        # Usamos --noconsole y --onefile para un ejecutable limpio
        # Ajusta "main.py" si tu archivo principal se llama distinto
        pyinstaller --noconsole --onefile --collect-all tkinterdnd2 --add-data "icons;icons" --icon "icons/app_icon.ico" main.py

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/pdf-merger.exe
        name: Release ${{ github.ref_name }}
        body: |
          Versión automatizada de PDF Merger Pro.
          - Build generado automáticamente por GitHub Actions.
          - Incluye todas las dependencias y recursos.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}